name: Desktop Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target"
        required: true
        default: "windows"
        type: choice
        options:
          - binaries
          - windows
  push:
    tags:
      - "v*"

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Build capi-core.exe for Windows (consumed by desktop-windows)
  # ──────────────────────────────────────────────────────────────────────
  binaries-windows:
    name: capi-core.exe (Windows)
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.target == 'binaries' || inputs.target == 'windows')
      || github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle
          components: "native-image"

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build capi-core native image
        run: ./gradlew :capi-core:nativeCompile --no-daemon

      - name: Upload capi-core.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: capi-core-windows
          path: capi-core/build/native/nativeCompile/capi-core.exe
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────
  # Windows desktop application (.msi / .exe)
  # ──────────────────────────────────────────────────────────────────────
  desktop-windows:
    name: Windows (.msi/.exe)
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.target == 'windows'
      || github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [binaries-windows]
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Download capi-core.exe
        uses: actions/download-artifact@v4
        with:
          name: capi-core-windows
          path: capi-desktop/bin/

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install npm dependencies
        run: npm ci
        working-directory: capi-desktop

      - name: Build Capi Desktop for Windows
        run: npm run tauri build
        working-directory: capi-desktop

      - name: Upload Windows installer bundle
        uses: actions/upload-artifact@v4
        with:
          name: Capi-Windows
          path: capi-desktop/src-tauri/target/release/bundle/
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: capi-desktop/src-tauri/target/release/bundle/**/*
          generate_release_notes: true
          draft: true
