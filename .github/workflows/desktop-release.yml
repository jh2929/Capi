name: Desktop Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target"
        required: true
        default: "binaries"
        type: choice
        options:
          - binaries
          - windows
          - linux
          - all
  push:
    tags:
      - "v*"

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Build capi-core.exe for Windows (used by desktop-windows via artifact)
  # ──────────────────────────────────────────────────────────────────────
  binaries-windows:
    name: 🔷 capi-core.exe (Windows)
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.target == 'binaries' || inputs.target == 'windows' || inputs.target == 'all')
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle
          components: "native-image"

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build capi-core JAR
        run: ./gradlew :capi-core:jar --no-daemon

      - name: Build native image with native-image CLI
        shell: bash
        run: |
          mkdir -p capi-core/build/native/nativeCompile
          "$JAVA_HOME/bin/native-image" \
            --no-fallback \
            "--initialize-at-build-time=kotlin.DeprecationLevel" \
            "--trace-class-initialization=kotlin.DeprecationLevel" \
            -jar capi-core/build/libs/capi-core.jar \
            capi-core/build/native/nativeCompile/capi-core.exe

      - name: Upload capi-core.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: capi-core-windows
          path: capi-core/build/native/nativeCompile/capi-core.exe
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────
  # Windows desktop application (.msi / .exe)
  # ──────────────────────────────────────────────────────────────────────
  desktop-windows:
    name: 🪟 Windows (.msi/.exe)
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.target == 'windows' || inputs.target == 'all') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    needs: [binaries-windows]
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download capi-core.exe
        uses: actions/download-artifact@v4
        with:
          name: capi-core-windows
          path: capi-desktop/bin/

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install npm dependencies
        run: npm install
        working-directory: capi-desktop

      - name: Build Capi Desktop for Windows
        run: npm run tauri build
        working-directory: capi-desktop

      - name: Upload Windows installer bundle
        uses: actions/upload-artifact@v4
        with:
          name: Capi-Windows
          path: capi-desktop/src-tauri/target/release/bundle/
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: capi-desktop/src-tauri/target/release/bundle/**/*
          generate_release_notes: true
          draft: ${{ github.event_name != 'push' }}
          name: Capi ${{ github.ref_name || 'pre-release' }}
          tag_name: ${{ github.ref_name || format('pre-{0}', github.run_number) }}

  # ──────────────────────────────────────────────────────────────────────
  # Linux packages (.deb / .AppImage / .rpm)
  # ──────────────────────────────────────────────────────────────────────
  desktop-linux:
    name: 🐧 Linux (.deb / .AppImage / .rpm)
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.target == 'linux' || inputs.target == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install npm dependencies
        run: npm install
        working-directory: capi-desktop

      - name: Build Capi Desktop for Linux (deb + AppImage + rpm)
        run: npm run tauri build -- --bundles deb,appimage,rpm
        working-directory: capi-desktop

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: Capi-Linux
          path: capi-desktop/src-tauri/target/release/bundle/
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: capi-desktop/src-tauri/target/release/bundle/**/*
          generate_release_notes: true
          draft: ${{ github.event_name != 'push' }}
          name: Capi ${{ github.ref_name || 'pre-release' }}
          tag_name: ${{ github.ref_name || format('pre-{0}', github.run_number) }}
